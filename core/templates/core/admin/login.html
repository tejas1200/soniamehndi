<html>

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!DOCTYPE html>

  <html>

  <head>
    <title>Admin Login</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Fonts -->

    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400;500&display=swap"
      rel="stylesheet">

    <style>
      body {
        margin: 0;
        font-family: 'Poppins', sans-serif;
        background: #0f3d2e;
        color: #fff;
      }

      /* 🔥 MAIN LAYOUT */
      .login-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      /* LEFT SIDE (IMAGE / BRAND) */
      .login-left {
        background: linear-gradient(rgba(15, 61, 46, 0.85), rgba(15, 61, 46, 0.95)),
          url("https://images.unsplash.com/photo-1606813909023-1c2b7c7e9c7f");
        background-size: cover;
        background-position: center;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .brand-title {
        font-family: 'Playfair Display', serif;
        font-size: 42px;
        color: #C5A880;
      }

      .brand-sub {
        margin-top: 15px;
        color: #ddd;
        max-width: 400px;
      }

      .brand-tag {
        font-size: 12px;
        letter-spacing: 3px;
        color: #C5A880;
        margin-bottom: 10px;
      }

      /* RIGHT SIDE (FORM) */
      .login-right {
        display: flex;
        align-items: center;
        justify-content: center;
        background: #0f3d2e;
      }

      .login-card {
        width: 100%;
        max-width: 400px;
        padding: 40px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }

      .login-title {
        font-family: 'Playfair Display', serif;
        font-size: 28px;
        margin-bottom: 25px;
        color: #C5A880;
        text-align: center;
      }

      /* INPUT */
      .form-control {
        background: transparent;
        border: 1px solid #aaa;
        color: #fff;
        border-radius: 8px;
        padding: 10px;
      }

      .form-control::placeholder {
        color: #ccc;
      }

      .form-control:focus {
        border-color: #C5A880;
        box-shadow: none;
      }

      /* PASSWORD ICON */
      .password-wrapper {
        position: relative;
      }

      .toggle-password {
        position: absolute;
        right: 12px;
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer;
        color: #aaa;
      }

      /* BUTTON */
      .btn-login {
        background: #C5A880;
        border: none;
        color: #000;
        padding: 10px;
        border-radius: 8px;
        font-weight: 500;
        transition: 0.3s;
      }

      .btn-login:hover {
        background: #d6b98c;
      }

      /* FOOTER */
      .footer-text {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #aaa;
      }

      /* MOBILE */
      @media (max-width: 768px) {
        .login-wrapper {
          grid-template-columns: 1fr;
        }

        .login-left {
          display: none;
        }

        .login-card {
          margin: 20px;
        }
      }
    </style>

  </head>

  <body>

    <div class="login-wrapper">

      <!-- 🌿 LEFT SIDE -->

      <div class="login-left">
        <div class="brand-tag">ADMIN PANEL</div>
        <div class="brand-title">Sonia Mehendi Studio</div>
        <p class="brand-sub">
          Manage bookings, customers, and designs with a premium dashboard experience.
        </p>
      </div>

      <!-- 🌿 RIGHT SIDE -->

      <div class="login-right">

        <div class="login-card">

          <div class="login-title">Admin Login</div>

          <form method="POST">
            {% csrf_token %}

            <input name="username" class="form-control mb-3" placeholder="Username">

            <div class="password-wrapper mb-3">
              <input type="password" name="password" id="password" class="form-control" placeholder="Password">
              <span class="toggle-password" onclick="togglePassword()">👁</span>
            </div>

            <button class="btn btn-login w-100">Login</button>
          </form>

          <div class="footer-text">
            © 2026 Sonia Mehendi Studio
          </div>

        </div>

      </div>

    </div>

    <script>
      function togglePassword() {
        const pass = document.getElementById("password");
        pass.type = pass.type === "password" ? "text" : "password";
      }
    </script>

  </body>

  </html>


</body>

</html>
